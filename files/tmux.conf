# azure-dev-terminal -- minimal tmux config (Tokyo Night-aligned)
set -g default-terminal "tmux-256color"
# Advertise 24-bit truecolor to the outer terminal so nvim's colorscheme
# renders correctly. foot reports TERM=foot (not *256col*), so it needs an
# explicit entry alongside xterm-256color.
set -as terminal-features ",foot:RGB"
set -as terminal-features ",xterm-256color:RGB"
# Mouse on (scroll + pane interaction). set-clipboard forwards OSC 52 escapes
# out to the client terminal, so copy-mode yanks reach the local clipboard.
set -g mouse on
set -g set-clipboard on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 10
set -g status-position top
# Tokyo Night (storm) status bar colors
set -g status-style "fg=#c0caf5,bg=#1f2335"
set -g status-left "#[fg=#7aa2f7,bold] #S "
set -g status-left-length 30
# Clock lives in i3status (i3bar, top-right); drop tmux's to avoid two clocks.
set -g status-right ""
set -g window-status-current-style "fg=#1f2335,bg=#7aa2f7,bold"
set -g pane-active-border-style "fg=#7aa2f7"
set -g pane-border-style "fg=#3b4261"

# Prefix-less window select (Alt+top-row -> windows 1-5). Requires the client
# terminal to send Alt/Meta as an escape sequence rather than composing
# characters. Leaves the default Ctrl+b prefix untouched.
bind -n M-q select-window -t 1
bind -n M-w select-window -t 2
bind -n M-e select-window -t 3
bind -n M-r select-window -t 4
bind -n M-t select-window -t 5

# Lock: <prefix> X works across every target sharing this tmux.conf, picking
# the right mechanism for whichever one is actually installed:
#  - rpi-desktop (sway/Wayland): swaylock is the real lock -- it grabs input
#    at the compositor level (wlr-input-inhibitor), covering the whole
#    session, not just this tmux client. Launched in the background
#    (run-shell -b) since it needs no terminal/tmux cooperation at all; it
#    is also already bound directly in sway to $mod+Shift+x.
#  - zero2w-console (cage/foot): cage does not implement wlr-input-inhibitor,
#    so swaylock cannot grab input there -- it would only draw a cosmetic,
#    insecure lock screen. vlock is the reliable alternative, but it needs a
#    real controlling terminal (cage/foot have no keybinding layer that can
#    host one), and a vlock'd tmux *window* is not enough on its own: other
#    windows/panes in the same client stay reachable, so switching away
#    defeats the lock. Instead, detach-client -E detaches the client and
#    runs vlock directly in its place (a real terminal, no tmux in the way)
#    -- there is nothing else to switch to while it's locked. On unlock, it
#    reattaches to the session automatically.
#  - any other target (e.g. zero2w-lean, with neither installed): show a
#    message instead of silently detaching/failing into a dead end.
bind-key X if-shell "command -v swaylock >/dev/null 2>&1" \
  "run-shell -b swaylock" \
  "if-shell \"command -v vlock >/dev/null 2>&1\" \"detach-client -E 'vlock && tmux attach'\" \"display-message 'no lock mechanism installed on this target'\""
