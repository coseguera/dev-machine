font=JetBrainsMono Nerd Font:size=12

# Disable sixel image support: it is an in-terminal image decoder (written in C)
# that parses attacker-controllable data from any program's output, so turning it
# off shrinks the hostile-input attack surface. This config is shared by the
# console (cage) and desktop (sway) targets.
# NB: sixel lives under foot's [tweak] section, not [main].
[tweak]
sixel=no

[colors]
alpha=1.0
background=1a1b26
foreground=c0caf5
regular0=15161e
regular1=f7768e
regular2=9ece6a
regular3=e0af68
regular4=7aa2f7
regular5=bb9af7
regular6=7dcfff
regular7=a9b1d6
bright0=414868
bright1=f7768e
bright2=9ece6a
bright3=e0af68
bright4=7aa2f7
bright5=bb9af7
bright6=7dcfff
bright7=c0caf5
